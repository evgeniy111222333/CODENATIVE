model:
  vocabulary_size: 4096
  model_dim: 128
  byte_embedding_dim: 32
  max_position_embeddings: 4096
  max_byte_window: 32
  max_ast_depth: 16
  semantic_blend: 0.2
  use_semantic_head: true
  recent_window: 128
  erm_key_dim: 128
  erm_blend: 0.15
  copy_recent_weight: 0.2
  max_recent_byte_payload: 32
  eem_key_dim: 128
  pointer_key_dim: 128
  eem_blend: 0.15
  copy_episodic_weight: 0.2
  min_chunk_tokens: 16
  max_chunk_tokens: 128
  eem_top_k: 2
  max_episodic_chunks: 64
  graph_key_dim: 128
  graph_top_k: 4
  graph_blend: 0.15
  graph_copy_weight: 0.5
  graph_samefile_bias: 2.0
  graph_import_bias: 1.5
  graph_symbol_bias: 1.25
  graph_test_bias: 1.0
  graph_diagnostic_bias: 1.0
  repo_max_files: 256
  parser_backend: tree-sitter
  supported_languages:
    - python
    - javascript
    - typescript
    - json
    - yaml
    - toml
    - ini
  max_parse_errors: 32
  graph_value_dim: 128
  graph_out_blend: 1.0
  symbol_link_weight: 0.1
  pre_router_hidden_dim: 128
  post_router_hidden_dim: 128
  route_temperature: 1.0
  route_top_k: 2
  route_threshold_cold_semantic: 0.35
  route_threshold_eem: 0.35
  route_threshold_graph: 0.35
  route_weight: 0.1
  energy_weight: 0.01
  route_consistency_weight: 0.02
  training_phase: phase_d
  router_warmup_steps: 256
  router_oracle_sharpness: 4.0
  router_oracle_bias_lm: 0.0
  router_oracle_bias_semantic: 0.0
  router_oracle_bias_erm: 0.0
  router_oracle_bias_eem: 0.0
  router_oracle_bias_graph: 0.0
  router_lane_dropout_prob: 0.05
  router_entropy_floor_min: 1.1
  router_entropy_floor_weight: 0.02
  router_collapse_mass_threshold: 0.95
  router_collapse_window: 32
  router_recovery_steps: 64
  lane_cost_lm: 1.0
  lane_cost_semantic_hot: 1.0
  lane_cost_erm: 1.0
  lane_cost_semantic_cold: 2.0
  lane_cost_eem: 2.5
  lane_cost_graph: 2.5
  maintenance_cost: 0.5
  optimizer_base_lr: 0.001
  auxiliary_cap_ratio: 0.5
  maintenance_cadence: 16
  maintenance_ema_decay: 0.9
  maintenance_loss_spike_delta: 0.05
  probe_min_tokens_per_sec: 5.0
  probe_max_energy_proxy: 20.0
  probe_min_recent_copy_hit_rate: 0.01
  probe_min_episodic_hit_rate: 0.01
  probe_min_symbol_link_hit_rate: 0.01
  probe_min_route_entropy: 0.5
hssm:
  max_level: 5
  hidden_size: 128
  stride_base: 2
  norm_clip: 10.0
semantic_memory:
  key_dim: 128
  hot_slots: 32
  cold_slots: 128
  beam_width: 8
  consolidation_fill_threshold: 0.75
  maintenance_budget: 1.0
  min_slots_for_consolidation: 8
